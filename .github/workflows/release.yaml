name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build release binary
        run: |
          set -eux
          corepack enable
          pnpm --dir web install --frozen-lockfile
          pnpm --dir web build
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/gogap-linux-amd64 ./cmd/gogap

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gogap-linux-amd64
