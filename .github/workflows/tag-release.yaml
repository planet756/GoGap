name: Tag Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -eux
          version="$(sed -nE 's/^const appVersion = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/p' cmd/gogap/main.go)"
          test -n "$version"
          changed="true"
          if [ "${{ github.event_name }}" = "push" ]; then
            previous="$(git show '${{ github.event.before }}:cmd/gogap/main.go' 2>/dev/null | sed -nE 's/^const appVersion = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/p' || true)"
            if [ "$previous" = "$version" ]; then
              changed="false"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.version.outputs.changed == 'true'
        run: |
          set -eux
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "$tag already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "GoGap ${{ steps.version.outputs.version }}"
          git push origin "$tag"

      - name: Publish GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GoGap ${{ steps.version.outputs.version }}
