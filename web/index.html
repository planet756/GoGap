<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GoGap 基金折溢价查看器 — 聚合官方净值与场内价格，实时查看折溢价率、涨跌幅和成交额。" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>GoGap 基金折溢价仪表盘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <main class="app-shell" id="app" data-dashboard-shell>
      <section class="hero-panel" aria-labelledby="dashboard-title">
        <h1 id="dashboard-title" class="hero-panel__title">GoGap<span class="hero-panel__sep">/</span><span class="hero-panel__sub">基金折溢价看板</span></h1>
      </section>

      <section class="filter-panel" aria-label="基金分类筛选">
        <div class="filter-panel__controls">
          <nav class="chip-group" aria-label="基金分类筛选">
            <button class="category-chip" type="button" data-category-all aria-pressed="true">全部</button>
            <button class="category-chip" type="button" data-category="QDII" aria-pressed="false">QDII</button>
            <button class="category-chip" type="button" data-category="商品" aria-pressed="false">商品</button>
            <button class="category-chip" type="button" data-category="香港" aria-pressed="false">香港</button>
            <button class="category-chip" type="button" data-category="主动LOF" aria-pressed="false">主动LOF</button>
            <button class="category-chip" type="button" data-category="指数LOF" aria-pressed="false">指数LOF</button>
            <button class="category-chip" type="button" data-category="ETF" aria-pressed="false">ETF</button>
            <button class="category-chip" type="button" data-category="债券货币" aria-pressed="false">债券货币</button>
          </nav>
          <div class="control-strip" aria-label="列表筛选与排序">
            <label class="search-control" for="fund-search">
              <input id="fund-search" type="search" data-search-input placeholder="输入代码或名称" autocomplete="off" />
              <button class="search-button" type="button" data-search-submit>搜索</button>
            </label>
            <label class="select-control" for="fund-sort">
              <span>排序</span>
              <select id="fund-sort" data-sort-select>
                <option value="">默认排序</option>
                <option value="premiumRate:desc">溢价率从高到低</option>
                <option value="premiumRate:asc">溢价率从低到高</option>
                <option value="quoteChangePercent:desc">场内涨跌幅从高到低</option>
                <option value="quoteChangePercent:asc">场内涨跌幅从低到高</option>
                <option value="navChangePercent:desc">净值涨跌幅从高到低</option>
                <option value="navChangePercent:asc">净值涨跌幅从低到高</option>
                <option value="turnoverAmount:desc">成交额从高到低</option>
                <option value="turnoverAmount:asc">成交额从低到高</option>
              </select>
            </label>
            <button class="watchlist-filter" type="button" data-purchase-limit-only aria-pressed="false">仅看限额</button>
            <button class="watchlist-filter" type="button" data-watchlist-only aria-pressed="false">仅看自选</button>
            <button class="watchlist-filter" type="button" data-filter-clear>清除</button>
            <button class="refresh-button watchlist-filter" type="button" data-snapshot-refresh>刷新</button>
          </div>
        </div>
      </section>

      <section class="data-panel" aria-labelledby="table-title">
        <div class="data-panel__header">
          <div class="section-heading">
            <p class="eyebrow">Snapshot</p>
            <h2 id="table-title">折溢价列表</h2>
          </div>
          <div class="status-stack" aria-label="数据源状态">
            <span class="status-badge status-badge--loading" data-source-status>加载中</span>
            <span class="status-badge status-badge--loading" data-stale-status>等待刷新</span>
          </div>
        </div>
        <div class="table-scroll" role="region" aria-label="基金折溢价表格" tabindex="0">
          <table class="fund-table" data-fund-table>
            <colgroup><col/><col/><col/><col/><col/><col/><col/></colgroup>
            <caption>基金折溢价监控表</caption>
            <thead>
              <tr>
                <th scope="col">基金名称</th>
                <th scope="col">申购/赎回</th>
                <th scope="col" class="numeric"><button class="sort-header-button" type="button" data-sort-button data-sort-key="navChangePercent" data-sort-direction="none" aria-sort="none"><span>净值/估值</span><svg class="sort-arrow" viewBox="0 0 12 16" aria-hidden="true"><path class="sort-arrow__up" d="M6 1 2 6h8L6 1Z"/><path class="sort-arrow__down" d="M6 15 2 10h8l-4 5Z"/></svg></button></th>
                <th scope="col" class="numeric"><button class="sort-header-button" type="button" data-sort-button data-sort-key="quoteChangePercent" data-sort-direction="none" aria-sort="none"><span>场内价格</span><svg class="sort-arrow" viewBox="0 0 12 16" aria-hidden="true"><path class="sort-arrow__up" d="M6 1 2 6h8L6 1Z"/><path class="sort-arrow__down" d="M6 15 2 10h8l-4 5Z"/></svg></button></th>
                <th scope="col" class="numeric"><button class="sort-header-button" type="button" data-sort-button data-sort-key="premiumRate" data-sort-direction="none" aria-sort="none"><span>折溢价率</span><svg class="sort-arrow" viewBox="0 0 12 16" aria-hidden="true"><path class="sort-arrow__up" d="M6 1 2 6h8L6 1Z"/><path class="sort-arrow__down" d="M6 15 2 10h8l-4 5Z"/></svg></button></th>
                <th scope="col" class="numeric">换手率/成交额</th>
                <th scope="col">自选</th>
              </tr>
            </thead>
            <tbody data-fund-rows>
              <tr class="empty-row" data-empty-row>
                <td colspan="7">
                  <div class="empty-state">
                    <span class="empty-state__orb" aria-hidden="true"></span>
                    <strong>暂无匹配基金</strong>
                    <span>请等待数据拉取完成，或调整分类、搜索、自选、限额筛选。</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer class="disclaimer" data-compliance-disclaimer>
        数据来源于公开信息；交易时段折溢价可基于盘中估值与最新场内价格计算，非交易时段基于官方已披露净值；不构成投资建议；投资有风险。
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
